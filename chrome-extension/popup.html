<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Hub Analyzer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 360px;
  min-height: 200px;
  background: #07070f;
  color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
}
.header {
  background: linear-gradient(135deg, #8b5cf6, #3b82f6);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo { font-size: 1.1rem; font-weight: 800; color: #fff; }
.logo-sub { font-size: 0.7rem; color: rgba(255,255,255,0.7); margin-top: 1px; }
.body { padding: 16px; }
#status { color: #94a3b8; font-size: 0.82rem; margin-bottom: 12px; }
#videoTitle {
  background: #10101e;
  border: 1px solid #252540;
  border-radius: 8px;
  padding: 10px 12px;
  color: #e2e8f0;
  font-size: 0.82rem;
  line-height: 1.5;
  margin-bottom: 12px;
  display: none;
}
.btn {
  width: 100%;
  padding: 10px;
  background: linear-gradient(135deg, #8b5cf6, #3b82f6);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 8px;
}
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  border: 1px solid #252540;
  color: #94a3b8;
}
.btn-ghost:hover { background: #10101e; color: #e2e8f0; }
.spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.results { margin-top: 12px; display: none; }
.section-title {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #64748b;
  margin-bottom: 8px;
  margin-top: 14px;
}
.section-title:first-child { margin-top: 0; }
.result-item {
  background: #10101e;
  border: 1px solid #1c1c30;
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 6px;
  font-size: 0.8rem;
  color: #94a3b8;
  line-height: 1.5;
  cursor: pointer;
  transition: border-color 0.15s;
}
.result-item:hover { border-color: #8b5cf6; color: #e2e8f0; }
.hashtags-wrap { display: flex; flex-wrap: wrap; gap: 4px; }
.hashtag { padding: 3px 8px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); border-radius: 12px; font-size: 0.72rem; color: #a78bfa; cursor: pointer; }
.hashtag:hover { background: rgba(139,92,246,0.25); }
.error { color: #ef4444; font-size: 0.8rem; padding: 10px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 6px; margin-top: 8px; }
.footer { padding: 10px 16px; border-top: 1px solid #1c1c30; text-align: center; font-size: 0.72rem; color: #64748b; }
.footer a { color: #8b5cf6; text-decoration: none; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">Creator Hub</div>
    <div class="logo-sub">YouTube Analyzer</div>
  </div>
</div>
<div class="body">
  <div id="status">Loading page info...</div>
  <div id="videoTitle"></div>
  <button class="btn" id="analyzeBtn" onclick="analyze()" disabled>
    <span class="spinner" id="spinner" style="display:none"></span>
    <span id="btnText">✨ Analyze Video</span>
  </button>
  <button class="btn btn-ghost" onclick="openHub()">Open Creator Hub →</button>
  <div id="error" style="display:none" class="error"></div>
  <div class="results" id="results">
    <div class="section-title">📜 Short Script Ideas</div>
    <div id="shortsResult"></div>
    <div class="section-title">🏷️ Hashtags</div>
    <div class="hashtags-wrap" id="hashtagsResult"></div>
    <div class="section-title">🎣 Hook Ideas</div>
    <div id="hooksResult"></div>
  </div>
</div>
<div class="footer">
  Requires <a href="#" onclick="openHub()">Creator Hub</a> running at localhost:3000
</div>
<script src="popup.js"></script>
</body>
</html>
